services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stp}
      POSTGRES_DB: ${POSTGRES_DB:-smart_travel_planner}
    ports:
      # Host port defaults to 5433 because 5432 is commonly already taken by
      # a native Postgres install on dev machines. The container itself
      # always listens on 5432 internally.
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - stp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stp} -d ${POSTGRES_DB:-smart_travel_planner}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  stp_pgdata:
    name: stp_pgdata
